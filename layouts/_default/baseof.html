<!doctype html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function () {
      var open = document.body.classList.toggle('nav-open');
      this.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    // Resources (and any) submenu disclosure buttons.
    document.querySelectorAll('.nav-parent').forEach(function (btn) {
      var li = btn.closest('.has-children');
      function close() { li.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
      function open() { li.classList.add('open'); btn.setAttribute('aria-expanded', 'true'); }
      btn.addEventListener('click', function () {
        li.classList.contains('open') ? close() : open();
      });
      btn.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { close(); btn.focus(); }
      });
      li.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { close(); btn.focus(); }
      });
      // Click outside closes the open submenu.
      document.addEventListener('click', function (e) {
        if (!li.contains(e.target)) close();
      });
    });
  </script>
</body>
</html>
