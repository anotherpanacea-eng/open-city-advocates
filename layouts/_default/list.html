{{ define "main" }}
<div class="wrap prose">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ with .Pages }}
    <ul class="post-list">
      {{ range .ByDate.Reverse }}
        <li class="post-list-item">
          <a class="post-list-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ with .Date }}<span class="post-list-date">{{ .Format "Jan 2, 2006" }}</span>{{ end }}
        </li>
      {{ end }}
    </ul>
  {{ end }}
</div>
{{ end }}
