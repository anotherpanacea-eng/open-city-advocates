<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  {{ with .Description | default .Site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  {{/* Fonts are self-hosted via @font-face in main.css (no third-party dependency). */}}
  {{ with resources.Get "css/main.css" }}
    {{ if hugo.IsProduction }}
      {{ $c := . | minify | fingerprint }}
      <link rel="stylesheet" href="{{ $c.RelPermalink }}" integrity="{{ $c.Data.Integrity }}">
    {{ else }}
      <link rel="stylesheet" href="{{ .RelPermalink }}">
    {{ end }}
  {{ end }}
</head>
