{{ $d := site.Data.homepage.footer }}
<footer>
  <div class="container">
    <div class="cols">
      <div>
        <img class="foot-logo-r" src="{{ "images/logo-reversed.png" | relURL }}" alt="{{ site.Title }}">
        <p class="addr">{{ $d.address | safeHTML }}</p>
      </div>
      {{ range $d.columns }}
      <div>
        <h4>{{ .title }}</h4>
        <ul>{{ range .links }}<li><a href="{{ .url }}">{{ .label }}</a></li>{{ end }}</ul>
      </div>
      {{ end }}
    </div>
    <div class="legal"><span>{{ $d.legal }}</span></div>
  </div>
</footer>
{{ if site.Params.oca.showSwitcher }}
<script>
(function(){
  var KEY='oca-home-theme';
  var saved=localStorage.getItem(KEY);
  if(saved){document.body.dataset.theme=saved;}
  var btns=document.querySelectorAll('#oca-switcher button');
  function sync(){btns.forEach(function(b){b.classList.toggle('on',b.dataset.t===document.body.dataset.theme);});}
  btns.forEach(function(b){b.addEventListener('click',function(){document.body.dataset.theme=b.dataset.t;localStorage.setItem(KEY,b.dataset.t);sync();});});
  sync();
})();
</script>
{{ end }}
