<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ .Site.Home.RelPermalink }}">Open City Advocates</a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">Menu</button>
    <nav class="site-nav" aria-label="Primary">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
            <li class="has-children">
              <span class="nav-parent" tabindex="0">{{ .Name }}</span>
              <ul class="submenu">
                {{ range .Children }}<li><a href="{{ .URL }}">{{ .Name }}</a></li>{{ end }}
              </ul>
            </li>
          {{ else }}
            <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        {{ end }}
      </ul>
      <div class="nav-actions">
        <a class="btn btn-outline" href="{{ .Site.Params.subscribeURL }}">Subscribe</a>
        {{ with .Site.GetPage "/join-us" }}<a class="btn btn-outline" href="{{ .RelPermalink }}">Join Us</a>{{ end }}
        <a class="btn btn-solid" href="{{ .Site.Params.donateURL }}">Donate</a>
      </div>
    </nav>
  </div>
</header>
