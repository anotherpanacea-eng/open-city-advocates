<footer class="site-footer">
  <div class="wrap footer-inner">
    {{ with resources.Get "images/logo-reversed.png" }}<img class="footer-logo" src="{{ .RelPermalink }}" alt="Open City Advocates" width="253" height="50">{{ else }}<div class="footer-brand">Open City Advocates</div>{{ end }}
    <address class="footer-contact">
      {{ .Site.Params.address }}<br>
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      <span aria-hidden="true"> · </span>
      <a href="tel:{{ replace .Site.Params.phone "-" "" }}">{{ .Site.Params.phone }}</a>
    </address>
    <p class="footer-note">Open City Advocates is a 501(c)(3) organization.</p>
  </div>
</footer>
