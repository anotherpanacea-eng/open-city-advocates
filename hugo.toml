# Open City Advocates — Hugo config (build target: Hugo 0.128.0, GitHub Pages)
# baseURL is overridden by the CI workflow's --baseURL flag; kept here for local builds.
baseURL = "https://anotherpanacea-eng.github.io/open-city-advocates/"
languageCode = "en-us"
title = "Open City Advocates"
enableRobotsTXT = true
enableGitInfo = false

[params]
  description = "Youth-centered legal defense and holistic advocacy for young people after sentencing in the DC juvenile justice system."
  tagline = "Legal defense and advocacy for youth after sentencing."   # PLACEHOLDER hero headline — confirm real one
  email = "info@opencityadvocates.org"
  phone = "202-678-9001"
  address = "1328 Florida Avenue NW, Second Floor, Washington, DC 20009"
  # External action links (NeonCRM) — TODO: replace "#" with real Neon URLs before launch
  subscribeURL = "#"
  donateURL = "#"

[menu]
  [[menu.main]]
    name = "About Us"
    pageRef = "/about-us"
    weight = 10
  [[menu.main]]
    name = "Our Team"
    pageRef = "/our-team"
    weight = 20
  [[menu.main]]
    name = "News"
    pageRef = "/news-updates"
    weight = 30
  [[menu.main]]
    name = "Resources"
    weight = 40
  [[menu.main]]
    name = "Post-Disposition Defense Guide"
    pageRef = "/post-disposition-defense-guide"
    parent = "Resources"
    weight = 41
  [[menu.main]]
    name = "A Call to Expand Post-Disposition Representation"
    pageRef = "/a-call-to-expand-post-disposition-representation-of-youth-in-the-juvenile-legal-system"
    parent = "Resources"
    weight = 42

[markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in content (needed for migrated embeds later)

[build]
  [build.buildStats]
    enable = false
