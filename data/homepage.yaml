hero:
  eyebrow: "Youth-centered legal defense · Washington, DC"
  headline: 'A sentence should not end a young person''s chance to <em>come home.</em> <span class="pending">⟦pending OCA⟧</span>'
  lead: "Free legal representation, holistic advocacy, and reentry support for young people committed to DYRS, from sentencing until they're free from state control."
  cta_primary: { label: "What we do", url: "/what-we-do-draft.html" }
  cta_secondary: { label: "Support the work", url: "https://opencityadvocates.app.neoncrm.com/forms/donation-form" }
  panel:
    big_num: "6 yrs"
    big_cap: "average client relationship, support that outlasts commitment. ⟦pending⟧"
    small_stats:
      - { num: "66", cap: "young people represented last year" }
      - { num: "38%", cap: "fewer re-arrests than DYRS peers ⟦pending⟧" }

story:
  eyebrow: "Since 2005"
  headline: "Twenty years of building hope"
  video: "https://www.youtube-nocookie.com/embed/oAz_uYa4SlM"
  paragraphs:
    - "Founded by two law students who found kids as young as 12 stuck behind bars without a lawyer, and operating at first out of a closet in a Ward 7 warehouse."
    - "Since then: the <em>In re N.H.M.</em> right-to-counsel victory (2020), the nation's first Post-Commitment Juvenile Attorney Panel (2022), and the Recidivism Reduction Act (2024)."

audiences:
  eyebrow: "Who we serve"
  headline: "Start where <em>you</em> are."
  cards:
    - eyebrow: "Young people & families"
      title: "Committed to DYRS? You still have the right to a lawyer."
      body: "Here's how to reach one: free, confidential, and yours for as long as you need it."
      link: "Know your rights"
      url: "/for-youth-and-families-draft.html"
    - eyebrow: "Attorneys & advocates"
      title: "Panel support and the defender manual."
      body: "Practice resources and the post-disposition practice community."
      link: "Practice resources"
      url: "/for-attorneys-draft.html"
    - eyebrow: "Donors & partners"
      title: "A small team. Reforms that reach every committed youth in DC."
      body: "Twenty years of casework and policy wins, funded by people like you."
      link: "Support the work"
      url: "/for-supporters-draft.html"

journey:
  eyebrow: "After sentencing"
  headline: "The journey we walk with <em>every client.</em>"
  cta: { label: "What happens at each stage", url: "/after-sentencing-draft.html" }
  steps:
    - { title: "Commitment", body: "Since 2022, every committed youth is appointed a post-commitment lawyer, the first-in-the-nation model OCA won in In re N.H.M. and helped the court build." }
    - { title: "Placement", body: "We advocate at every placement decision and monitor what happens inside." }
    - { title: "Life inside", body: "We fight for education access, real treatment, and family engagement." }
    - { title: "Review hearings", body: "We represent our clients at every hearing, and we pushed to reform the rules that govern them." }
    - { title: "Coming home", body: "Our reentry coordination continues after release; clients stay with OCA for an average of six years." }
    - { title: "After commitment", body: "We help clients seal their records and press for laws that shorten the system's reach." }

numbers:
  eyebrow: "The record"
  headline: "By the numbers"
  stats:
