# The After-Sentencing journey — OCA's signature structure.
# One data file, multiple surfaces: home strip (compact) + after-sentencing page (expanded).
# Copy grounded in OCA's published testimony and grant narratives; see hugo-migration/oca/drive-*.md.
- id: commitment
  kicker: "01 · Disposition"
  name: "Commitment"
  happens: "The court commits a young person to DYRS custody as a ward of the District, often until age 21. Placement can change repeatedly with little or no court oversight."
  oca: "Since 2022, every committed youth is appointed a post-commitment lawyer, the first-in-the-nation model OCA won in In re N.H.M. and helped the court build."
  links:
    - title: "A Call to Expand Post-Disposition Representation"
      page: "/a-call-to-expand-post-disposition-representation-of-youth-in-the-juvenile-legal-system"
- id: placement
  kicker: "02 · Placement"
  name: "Placement"
  happens: "A secure facility, a group home, a psychiatric treatment facility, or home: decisions that can uproot a young person overnight."
  oca: "We advocate at every placement decision and monitor what happens inside."
  links:
    - title: "DYRS Performance Oversight testimony (2026)"
      page: "/policy-advocacy/2026-02-02-dyrs-performance-oversight-testimony"
- id: life-inside
  kicker: "03 · While committed"
  name: "Life inside"
  happens: "School, behavioral health services, and family contact all continue (or fail to) while a young person is committed."
  oca: "We fight for education access, real treatment, and family engagement."
  links:
    - title: "LEARNS Act testimony"
      page: "/policy-advocacy/2026-05-06-learns-act-testimony"
    - title: "Parental engagement testimony"
      page: "/policy-advocacy/2025-11-10-parental-engagement-testimony"
- id: review-hearings
  kicker: "04 · Review"
  name: "Review hearings"
  happens: "Community status review hearings decide when a young person steps down toward home."
  oca: "We represent our clients at every hearing, and we pushed to reform the rules that govern them."
  links:
    - title: "Joint comment on the CSRH rulemaking (2026)"
      href: "/docs/2026-07-01-dcmr-csrh-joint-letter.pdf"
- id: coming-home
  kicker: "05 · Reentry"
  name: "Coming home"
  happens: "Housing, re-enrolling in school, finding work: the moment when most support disappears."
  oca: "Our reentry coordination continues after release; clients stay with OCA for an average of six years."
  links:
    - title: "OVSJG budget testimony (2025)"
      page: "/policy-advocacy/2025-06-12-ovsjg-budget-testimony"
- id: after
  kicker: "06 · After"
  name: "After commitment"
  happens: "Commitment ends, but a juvenile record shouldn't follow a young person for life."
  oca: "We help clients seal their records and press for laws that shorten the system's reach."
  links: []
  coming: "Record-sealing guide coming soon. This is the next page OCA builds."
